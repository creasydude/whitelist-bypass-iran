name: Build headless Linux amd64 (separate artifacts)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build headless creator (Linux amd64)
        working-directory: ./headless/bale
        run: |
          go build -o headless-bale-creator-linux-amd64 .

      - name: Build headless joiner (Linux amd64)
        working-directory: ./headless/bale-joiner
        run: |
          go build -o headless-bale-joiner-linux-amd64 .

      - name: Upload creator artifact
        uses: actions/upload-artifact@v4
        with:
          name: headless-bale-creator-linux-amd64
          path: headless/bale/headless-bale-creator-linux-amd64

      - name: Upload joiner artifact
        uses: actions/upload-artifact@v4
        with:
          name: headless-bale-joiner-linux-amd64
          path: headless/bale-joiner/headless-bale-joiner-linux-amd64
